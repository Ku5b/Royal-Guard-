<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المنسوبين الموحدة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #050505;
            color: white;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 450px; padding: 30px 20px; margin: 0 auto; }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 20px;
        }
        .header img { width: 110px; margin: 0 auto 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.05)); }
        .header h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; }

        .portal-card {
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 28px 25px;
            border-radius: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .portal-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 100, 0, 0.3);
            background: #0d0d0d;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-left: 20px;
        }

        .bg-work { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .bg-rules { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }

        .card-info h3 { font-weight: 900; font-size: 1.1rem; margin-bottom: 4px; }
        .card-info p { font-size: 0.8rem; color: #555; font-weight: 600; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            color: #444;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-weight: 700;
            transition: 0.3s;
        }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-right ml-2"></i> العودة للرئيسية
        </a>

        <div class="header" data-aos="fade-down">
            <img src="unnamed.png" alt="الشعار">
            <h1>بوابة المنسوبين الموحدة</h1>
        </div>

        <!-- 1. تسجيل الأعمال -->
        <a href="work-log.html" class="portal-card" data-aos="fade-up" data-aos-delay="100">
            <div class="icon-box bg-work">
                <i class="fa-solid fa-clipboard-check"></i>
            </div>
            <div class="card-info">
                <h3>تسجيل الأعمال اليومية</h3>
                <p>رفع تقارير الإنجاز والمهام الميدانية</p>
            </div>
        </a>

        <!-- 2. اللائحة التنظيمية -->
        <a href="regulations.html" class="portal-card" data-aos="fade-up" data-aos-delay="200">
            <div class="icon-box bg-rules">
                <i class="fa-solid fa-gavel"></i>
            </div>
            <div class="card-info">
                <h3>اللائحة والأنظمة</h3>
                <p>الأنظمة العسكرية واللوائح الداخلية</p>
            </div>
        </a>

        <div class="text-center mt-20 opacity-20 text-[10px] font-black tracking-widest">
            SECURE ACCESS ONLY
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
