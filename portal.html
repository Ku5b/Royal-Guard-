<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المنسوبين الموحدة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #050505;
            color: white;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 450px; padding: 30px 20px; margin: 0 auto; }

        /* رأس الصفحة */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header img { width: 100px; margin: 0 auto 15px; }
        .header h1 { font-size: 1.3rem; font-weight: 900; }

        /* تصميم البطاقات الجديدة */
        .portal-card {
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 22px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .portal-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.2);
            background: #0d0d0d;
        }

        .icon-box {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-left: 20px;
        }

        /* ألوان الأقسام */
        .bg-work { background: rgba(34, 197, 94, 0.1); color: #22c55e; } /* أخضر */
        .bg-rules { background: rgba(59, 130, 246, 0.1); color: #3b82f6; } /* أزرق */
        .bg-honor { background: rgba(234, 179, 8, 0.1); color: #eab308; } /* ذهبي */

        .card-info h3 { font-weight: 900; font-size: 1rem; margin-bottom: 4px; }
        .card-info p { font-size: 0.75rem; color: #666; font-weight: 600; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- زر العودة -->
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-right ml-2"></i> العودة للرئيسية
        </a>

        <div class="header" data-aos="fade-down">
            <img src="unnamed.png" alt="الشعار">
            <h1>بوابة المنسوبين الموحدة</h1>
        </div>

        <!-- 1. تسجيل الأعمال -->
        <a href="work-log.html" class="portal-card" data-aos="fade-up" data-aos-delay="100">
            <div class="icon-box bg-work">
                <i class="fa-solid fa-pen-to-square"></i>
            </div>
            <div class="card-info">
                <h3>تسجيل الأعمال اليومية</h3>
                <p>رفع التقارير وإثبات المهام المنجزة</p>
            </div>
        </a>

        <!-- 2. اللائحة التنظيمية -->
        <a href="bylaws.html" class="portal-card" data-aos="fade-up" data-aos-delay="200">
            <div class="icon-box bg-rules">
                <i class="fa-solid fa-book-shield"></i>
            </div>
            <div class="card-info">
                <h3>اللائحة والأنظمة</h3>
                <p>دليل الحقوق والواجبات العسكرية</p>
            </div>
        </a>

        <!-- 3. وسام التميز -->
        <a href="honor-roll.html" class="portal-card" data-aos="fade-up" data-aos-delay="300">
            <div class="icon-box bg-honor">
                <i class="fa-solid fa-medal"></i>
            </div>
            <div class="card-info">
                <h3>وسام التميز</h3>
                <p>قائمة المكرمين والمتميزين بالحرس الملكي</p>
            </div>
        </a>

    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
