<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاعدة بيانات المنسوبين</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: white; min-height: 100vh; }
        .db-container { width: 100%; max-width: 1000px; padding: 20px; margin: 0 auto; }
        
        /* تصميم الجدول الاحترافي */
        .table-wrapper {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 15px;
            overflow-x: auto; /* للسماح بالتمرير على الجوال */
            margin-top: 20px;
        }
        
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.85rem; }
        th { background: #111; color: #d4af37; padding: 15px; border-bottom: 2px solid #1a1a1a; font-weight: 900; }
        td { padding: 12px; border-bottom: 1px solid #151515; color: #eee; }
        tr:hover { background: rgba(212, 175, 55, 0.03); }

        .rank-badge { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; border: 1px solid #333; font-size: 0.75rem; }
        .unit-tag { color: #22c55e; font-weight: 700; }

        .back-link {
            display: inline-flex; align-items: center; color: #555;
            text-decoration: none; font-size: 0.85rem; margin-bottom: 15px; transition: 0.3s;
        }
        .back-link:hover { color: #d4af37; }
    </style>
</head>
<body>

    <div class="db-container">
        <a href="portal.html" class="back-link">
            <i class="fa-solid fa-arrow-right ml-2"></i> العودة للبوابة
        </a>

        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-white">قاعدة بيانات المنسوبين</h1>
            <p class="text-gray-500 text-xs mt-2 tracking-widest uppercase">Personnel Records • Royal Guard</p>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>اليونت (Unit)</th>
                        <th>الاسم (Discord)</th>
                        <th>الاسم (Roblox)</th>
                        <th>الرتبة (الحرس)</th>
                        <th>الرتبة (الداخلية)</th>
                        <th>الإيميل</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="unit-tag">قيادة الرئاسة</td>
                        <td>Sultan#0001</td>
                        <td>Sultan_RG</td>
                        <td><span class="rank-badge">مقدم</span></td>
                        <td><span class="rank-badge">عقيد</span></td>
                        <td class="text-gray-400">sultan@example.com</td>
                    </tr>
                    
                    <tr>
                        <td class="unit-tag">قوة الحماية</td>
                        <td>User#1234</td>
                        <td>Player_99</td>
                        <td><span class="rank-badge">ملازم أول</span></td>
                        <td><span class="rank-badge">رائد</span></td>
                        <td class="text-gray-400">member@example.com</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
