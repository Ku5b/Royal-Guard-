<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاعدة بيانات المنسوبين</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: white; min-height: 100vh; margin: 0; }
        .db-container { width: 100%; max-width: 1000px; padding: 15px; margin: 0 auto; }
        
        /* تحسين الحاوية لمنع التداخل */
        .table-wrapper {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 15px;
            overflow-x: auto; /* يسمح بالتمرير الجانبي بدلاً من التداخل */
            -webkit-overflow-scrolling: touch;
        }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; } /* حد أدنى للعرض لمنع ضغط الأعمدة */
        th { background: #111; color: #d4af37; padding: 12px 8px; border-bottom: 2px solid #1a1a1a; font-weight: 900; font-size: 0.8rem; }
        td { padding: 12px 8px; border-bottom: 1px solid #151515; color: #eee; font-size: 0.8rem; vertical-align: middle; }

        /* تنسيق الرتب لمنع التداخل */
        .rank-badge { 
            background: rgba(255,255,255,0.05); 
            padding: 5px 8px; 
            border-radius: 6px; 
            border: 1px solid #333; 
            white-space: nowrap; /* يمنع نزول النص لسطر جديد */
            display: inline-block;
        }

        .unit-tag { color: #22c55e; font-weight: 700; white-space: nowrap; }

        .back-link {
            display: inline-flex; align-items: center; color: #555;
            text-decoration: none; font-size: 0.8rem; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="db-container">
        <a href="portal.html" class="back-link">
            <i class="fa-solid fa-arrow-right ml-2"></i> العودة للبوابة
        </a>

        <div class="text-center mb-6">
            <h1 class="text-xl font-black text-white">قاعدة بيانات المنسوبين</h1>
            <p class="text-gray-600 text-[10px] tracking-widest uppercase">Personnel Records • Royal Guard</p>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>اليونت</th>
                        <th>Discord</th>
                        <th>Roblox</th>
                        <th>رتبة الحرس</th>
                        <th>رتبة الداخلية</th>
                        <th>الإيميل</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="unit-tag">S-1</td>
                        <td>D_9z</td>
                        <td>HioTri1</td>
                        <td><span class="rank-badge">رئيس الحرس الملكي</span></td>
                        <td><span class="rank-badge">مقدم</span></td>
                        <td class="text-gray-500">Sloo6hp@gmail.com</td>
                    </tr>
                    <tr>
                        <td class="unit-tag">P-6</td>
                        <td>nawaf8203</td>
                        <td>Player_99</td>
                        <td><span class="rank-badge">نائب رئيس الحرس الملكي </span></td>
                        <td><span class="rank-badge">ملازم أول</span></td>
                        <td class="text-gray-500">member@mail.com</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
