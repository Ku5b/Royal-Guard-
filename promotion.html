<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمارة طلب ترقية | الحرس الملكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: white; padding: 20px; }
        
        .form-card {
            max-width: 450px; margin: 0 auto;
            background: linear-gradient(145deg, #0a0a0a, #050505);
            padding: 30px 20px; border-radius: 25px;
            border: 1px solid #151515;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .header-title { text-align: center; margin-bottom: 30px; }
        .header-title h1 { font-weight: 900; font-size: 1.4rem; color: #22c55e; }
        .header-title p { font-size: 0.6rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }

        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 6px; margin-right: 5px; }
        
        .field {
            width: 100%; background: #0f0f0f; border: 1px solid #1a1a1a;
            padding: 14px; border-radius: 12px; color: white; font-size: 0.85rem;
            outline: none; transition: 0.3s;
        }
        .field:focus { border-color: #22c55e; background: #111; }

        .submit-btn {
            width: 100%; background: #22c55e; color: white; font-weight: 900;
            padding: 16px; border-radius: 15px; margin-top: 10px;
            cursor: pointer; transition: 0.3s; border: none; font-size: 1rem;
        }
        .submit-btn:hover { background: #16a34a; transform: translateY(-2px); }
        
        .back-link { display: block; text-align: center; margin-top: 20px; font-size: 0.7rem; color: #444; text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-card">
        <div class="header-title">
            <h1 class="mb-1">استمارة طلب ترقية</h1>
            <p>Promotion Request Form</p>
        </div>

        <form action="https://formspree.io/f/xbdwzwkp" method="POST">
            
            <!-- الاسم -->
            <div class="input-group">
                <label><i class="fa-solid fa-user ml-1"></i> الاسم في Roblox</label>
                <input type="text" name="الاسم" class="field" placeholder="مثال: Sultan_511" required>
            </div>

            <!-- الرتبة العسكرية الحالية -->
            <div class="input-group">
                <label><i class="fa-solid fa-medal ml-1"></i> الرتبة العسكرية الحالية</label>
                <input type="text" name="الرتبة_الحالية" class="field" placeholder="مثال: ملازم أول" required>
            </div>

            <!-- اليونت -->
            <div class="input-group">
                <label><i class="fa-solid fa-shield-halved ml-1"></i> اليونت (القطاع)</label>
                <input type="text" name="اليونت" class="field" placeholder="مثال: الشرطة العسكرية" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- الرتبة السابقة -->
                <div class="input-group">
                    <label>الرتبة السابقة</label>
                    <input type="text" name="الرتبة_السابقة" class="field" placeholder="مثال: ملازم">
                </div>
                <!-- الرتبة الجديدة -->
                <div class="input-group">
                    <label>الرتبة المطلوبة</label>
                    <input type="text" name="الرتبة_الجديدة" class="field" placeholder="مثال: نقيب" required>
                </div>
            </div>

            <!-- آخر مدة ترقية -->
            <div class="input-group">
                <label><i class="fa-solid fa-calendar-days ml-1"></i> تاريخ أو مدة آخر ترقية</label>
                <input type="text" name="اخر_مدة_ترقية" class="field" placeholder="مثال: قبل شهرين">
            </div>

            <!-- الأعمال المنجزة -->
            <div class="input-group">
                <label><i class="fa-solid fa-briefcase ml-1"></i> الأعمال المنجزة في القطاع</label>
                <textarea name="الاعمال_المنجزة" class="field h-28" placeholder="اذكر إنجازاتك التي تستحق عليها الترقية..."></textarea>
            </div>

            <button type="submit" class="submit-btn">إرسال الطلب للقيادة</button>
            
            <a href="staff.html" class="back-link">العودة لشؤون الأفراد</a>
        </form>
    </div>

</body>
</html>
