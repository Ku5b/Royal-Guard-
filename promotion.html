<!DOCTYPE html>
<html lang="ar" dir="rtl"><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب ترقية عسكرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: white; padding: 20px; min-height: 100vh; display: flex; align-items: center; }
        .form-container { max-width: 450px; margin: 0 auto; background: #050505; padding: 30px; border-radius: 25px; border: 1px solid #111; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .input-style { background: #0a0a0a; border: 1px solid #1a1a1a; width: 100%; padding: 14px; border-radius: 12px; margin-top: 8px; color: white; outline: none; font-size: 0.9rem; transition: 0.3s; }
        .input-style:focus { border-color: #008000; background: #0c0c0c; }
        .submit-btn { background: #fff; color: #000; width: 100%; padding: 16px; border-radius: 12px; font-weight: 900; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: #008000; color: #fff; }
    </style>
</head>
<body>
    <div class="form-container">
        <!-- زر العودة -->
        <a href="staff.html" class="text-gray-600 text-[10px] mb-4 inline-block hover:text-white">← العودة لشؤون الأفراد</a>
        
        <h2 class="text-xl font-black text-center mb-2">استمارة طلب ترقية</h2>
        <p class="text-[10px] text-gray-500 text-center mb-8 uppercase tracking-widest">Promotion Request Form</p>
        
        <form action="https://formspree.io/f/xbdwzwkp" method="POST">
            <div class="mb-4">
                <label class="text-xs text-gray-500 mr-2">الاسم في Roblox</label>
                <input type="text" name="Roblox_Name" class="input-style" placeholder="مثال: Sultan_511" required>
            </div>

            <div class="mb-4">
                <label class="text-xs text-gray-500 mr-2">الرتبة الحالية</label>
                <input type="text" name="Current_Rank" class="input-style" placeholder="مثال: ملازم" required>
            </div>

            <div class="mb-4">
                <label class="text-xs text-gray-500 mr-2">الرتبة المطلوبة</label>
                <input type="text" name="Target_Rank" class="input-style" placeholder="مثال: ملازم أول" required>
            </div>

            <div class="mb-4">
                <label class="text-xs text-gray-500 mr-2">سبب استحقاق الترقية</label>
                <textarea name="Reason" class="input-style h-24" placeholder="اذكر إنجازاتك في القطاع..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">إرسال الطلب إلى القيادة</button>
        </form>
    </div>
</body>
</html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب ترقية عسكرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: white; padding: 20px; }
        .form-container { max-width: 500px; margin: 0 auto; background: #050505; padding: 30px; border-radius: 20px; border: 1px solid #111; }
        .input-style { background: #0a0a0a; border: 1px solid #1a1a1a; width: 100%; padding: 12px; border-radius: 10px; margin-top: 8px; color: white; outline: none; }
        .input-style:focus { border-color: #22c55e; }
        .submit-btn { background: #22c55e; color: white; width: 100%; padding: 15px; border-radius: 10px; font-weight: 900; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 class="text-xl font-black text-center mb-6 text-green-600">استمارة طلب ترقية</h2>
        
        <!-- استبدل الرابط برابط Formspree الخاص بك -->
        <form action="https://formspree.io/f/xbdwzwkp" method="POST">
            <label class="text-sm text-gray-400">الاسم الثلاثي (Roblox):</label>
            <input type="text" name="الاسم" class="input-style" required>

            <label class="text-sm text-gray-400 mt-4 block">الرتبة الحالية:</label>
            <input type="text" name="الرتبة_الحالية" class="input-style" required>

            <label class="text-sm text-gray-400 mt-4 block">آخر موعد ترقية (إن وجد):</label>
            <input type="date" name="تاريخ_آخر_ترقية" class="input-style">

            <label class="text-sm text-gray-400 mt-4 block">الإنجازات أو المبررات للترقية:</label>
            <textarea name="المبررات" class="input-style h-32" placeholder="اذكر سبب استحقاقك للترقية..."></textarea>

            <button type="submit" class="submit-btn">إرسال الطلب للقيادة</button>
        </form>
    </div>
</body>
</html>
