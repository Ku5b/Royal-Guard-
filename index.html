<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة رئاسة الحرس الملكي | R.G.H</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #050505; /* أسود ملكي مطفي */
            min-height: 100vh;
            margin: 0;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* لمسة علوية خضراء رسمية */
        body::before {
            content: "";
            position: absolute;
            top: 0; width: 100%; height: 5px;
            background: #004d00;
        }

        .container { width: 100%; max-width: 400px; padding: 30px 20px; }

        /* شعار الحرس الملكي */
        .logo-wrapper { text-align: center; margin-bottom: 40px; }
        .main-logo { 
            width: 160px; 
            margin: 0 auto; 
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.1));
        }

        .header-title {
            text-align: center;
            margin-bottom: 40px;
        }
        .header-title h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; }
        .header-title p { font-size: 0.7rem; opacity: 0.4; letter-spacing: 3px; margin-top: 5px; }

        /* الأزرار الرسمية - فخامة وبساطة */
        .btn-official {
            background: white;
            color: black;
            font-weight: 900;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-bottom: 15px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255,255,255,0.05);
        }

        .btn-outline-official {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 700;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        /* شبكة الروابط الإدارية */
        .admin-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 20px;
        }
        .grid-item {
            background: #0a0a0a;
            border: 1px solid #151515;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .grid-item i { font-size: 1.2rem; color: #004d00; }
        .grid-item span { font-size: 0.85rem; font-weight: 700; }

        /* تذييل رسمي */
        .official-footer {
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            text-align: center;
        }
        .footer-text { font-size: 0.6rem; opacity: 0.3; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper" data-aos="fade-down">
            <img src="royal_guard_logo.png" alt="Royal Guard Logo" class="main-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1022/1022215.png'">
        </div>

        <div class="header-title" data-aos="fade-up">
            <h1>رئاسة الحرس الملكي</h1>
            <p>ROYAL GUARD PRESIDENCY</p>
        </div>

        <div class="main-links">
            <a href="portal.html" class="btn-official" data-aos="fade-up" data-aos-delay="100">بوابة الدخول الموحد</a>
            
            <a href="regulations.html" class="btn-outline-official" data-aos="fade-up" data-aos-delay="200">
                <i class="fa-solid fa-file-shield ml-2 text-green-700"></i> الأنظمة واللوائح الإدارية
            </a>
        </div>

        <div class="admin-grid">
            <a href="staff.html" class="grid-item" data-aos="zoom-in" data-aos-delay="300">
                <i class="fa-solid fa-sitemap"></i>
                <span>الهيكل التنظيمي</span>
            </a>
            <a href="notices.html" class="grid-item" data-aos="zoom-in" data-aos-delay="400">
                <i class="fa-solid fa-bullhorn"></i>
                <span>المركز الإعلامي</span>
            </a>
        </div>

        <div class="official-footer">
            <div class="footer-text">نظام إدارة رئاسة الحرس الملكي • 2026</div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
