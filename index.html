<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة رئاسة الحرس الملكي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #050505;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 400px; padding: 40px 20px; }

        /* منطقة الشعار - ربط مباشر بالملف الجديد */
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .main-logo {
            width: 160px; /* حجم مثالي للشعار الدائري */
            height: auto;
            margin: 0 auto;
            filter: drop-shadow(0 0 15px rgba(0, 100, 0, 0.2));
        }

        .title-section { text-align: center; margin-bottom: 35px; }
        .title-section h1 { font-size: 1.5rem; font-weight: 900; color: #ffffff; }
        .title-section p { font-size: 0.65rem; color: #555; letter-spacing: 3px; font-weight: 700; }

        /* الزر الرئيسي المضيء */
        .official-link {
            background: #ffffff;
            color: #000000;
            font-weight: 900;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .official-link:hover { transform: scale(1.02); }

        /* تنسيق الخانات الجديد (Glass Effect) */
        .secondary-link {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-bottom: 15px;
            font-weight: 700;
            transition: 0.3s;
        }
        .secondary-link:hover { background: rgba(255, 255, 255, 0.07); border-color: #004d00; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 5px;
        }

        /* خانات الشبكة بتصميم البطاقات الاحترافية */
        .grid-box {
            background: linear-gradient(145deg, #0a0a0a, #111);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px 15px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: 0.4s;
            position: relative;
        }
        .grid-box i { 
            display: block;
            color: #008000; /* لون أخضر رسمي */
            margin-bottom: 12px; 
            font-size: 1.4rem;
            transition: 0.3s;
        }
        .grid-box span { font-size: 0.85rem; font-weight: 700; }

        /* تأثير الحركة عند التمرير */
        .grid-box:hover {
            border-color: rgba(0, 128, 0, 0.4);
            transform: translateY(-5px);
            background: #0d0d0d;
        }
        .grid-box:hover i { transform: scale(1.2); color: #00ff00; }

        .footer-tag {
            margin-top: 40px;
            text-align: center;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #222;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ربط ملف الشعار الجديد -->
        <div class="logo-container" data-aos="zoom-in">
            <img src="unnamed.png" 
                 alt="شعار رئاسة الحرس الملكي" 
                 class="main-logo"
                 onerror="this.src='https://i.ibb.co/c88a0104-b3c1-4249-8e10-df408a64aff2/image.png'">
        </div>

        <div class="title-section" data-aos="fade-up">
            <h1>رئاسة الحرس الملكي</h1>
            <p>ADMINISTRATIVE PORTAL</p>
        </div>

        <!-- الخانة الرئيسية -->
        <a href="portal.html" class="official-link" data-aos="fade-up" data-aos-delay="100">بوابة المنسوبين الموحدة</a>
        
        <!-- خانة الأنظمة -->
        <a href="regulations.html" class="secondary-link" data-aos="fade-up" data-aos-delay="200">
            <i class="fa-solid fa-file-shield ml-2"></i> الأنظمة والتعليمات الإدارية
        </a>

        <!-- شبكة الخانات المطورة -->
        <div class="info-grid">
            <a href="org.html" class="grid-box" data-aos="zoom-in" data-aos-delay="300">
                <i class="fa-solid fa-sitemap"></i>
                <span>الهيكل التنظيمي</span>
            </a>
            <a href="staff.html" class="grid-box" data-aos="zoom-in" data-aos-delay="400">
                <i class="fa-solid fa-users-gear"></i>
                <span>شؤون الأفراد</span>
            </a>
        </div>

        <div class="footer-tag">
            R.G.H MANAGEMENT SYSTEM • 2026
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
