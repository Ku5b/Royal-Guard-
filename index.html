<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة رئاسة الحرس الملكي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #050505;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 400px; padding: 30px 20px; }

        /* تنسيق الشعار لضمان الملء الصحيح للمساحة */
        .logo-container {
            text-align: center;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            height: 200px; /* تحديد ارتفاع ثابت لمنع القفز */
            align-items: center;
        }
        .main-logo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .title-section { text-align: center; margin-bottom: 35px; }
        .title-section h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 2px; }
        .title-section p { font-size: 0.6rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }

        /* الأزرار الرسمية */
        .official-link {
            background: #ffffff;
            color: #000000;
            font-weight: 900;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(255,255,255,0.05);
        }

        .secondary-link {
            background: #111;
            color: #ffffff;
            border: 1px solid #222;
            font-weight: 700;
            padding: 16px;
            border-radius: 15px;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-bottom: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .grid-box {
            background: #080808;
            border: 1px solid #151515;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
        }
        .grid-box i { color: #15803d; margin-bottom: 8px; font-size: 1.2rem; }
        .grid-box span { display: block; font-size: 0.8rem; font-weight: 900; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container" data-aos="zoom-in">
            <img src="unnamed.png" 
                 alt="شعار رئاسة الحرس الملكي" 
                 class="main-logo">
        </div>

        <div class="title-section" data-aos="fade-up">
            <h1>رئاسة الحرس الملكي</h1>
            <p>Royal Guard Presidency</p>
        </div>

        <a href="portal.html" class="official-link" data-aos="fade-up" data-aos-delay="100">بوابة المنسوبين الموحدة</a>
        
        <a href="regulations.html" class="secondary-link" data-aos="fade-up" data-aos-delay="200">
            <i class="fa-solid fa-file-shield ml-2 text-green-700"></i> الأنظمة واللوائح الإدارية
        </a>

        <div class="info-grid">
            <a href="org.html" class="grid-box" data-aos="zoom-in" data-aos-delay="300">
                <i class="fa-solid fa-sitemap"></i>
                <span>الهيكل التنظيمي</span>
            </a>
            <a href="staff.html" class="grid-box" data-aos="zoom-in" data-aos-delay="400">
                <i class="fa-solid fa-users-gear"></i>
                <span>شؤون الأفراد</span>
            </a>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
