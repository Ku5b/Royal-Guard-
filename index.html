<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة رئاسة الحرس الملكي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #080808;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 400px; padding: 50px 20px; }

        /* ضبط الشعار الرسمي */
        .logo-box {
            text-align: center;
            margin-bottom: 30px;
        }
        .main-logo {
            width: 180px; /* تكبير الحجم لبروز تفاصيل الشعار */
            height: auto;
            margin: 0 auto;
            filter: drop-shadow(0 0 20px rgba(0, 100, 0, 0.3));
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h1 { font-size: 1.6rem; font-weight: 900; color: #ffffff; margin-bottom: 5px; }
        .header-section .line { width: 50px; height: 3px; background: #c5a059; margin: 10px auto; }

        /* أزرار الهوية الرسمية */
        .royal-btn {
            background: #ffffff;
            color: #000000;
            font-weight: 900;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-bottom: 15px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
            border: 1px solid rgba(197, 160, 89, 0.3);
            font-weight: 700;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-bottom: 15px;
        }

        .grid-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .nav-item {
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
        }
        .nav-item i { color: #c5a059; margin-bottom: 10px; font-size: 1.3rem; }
        .nav-item span { display: block; font-size: 0.85rem; font-weight: 700; }

        footer { margin-top: auto; padding: 20px; opacity: 0.2; font-size: 0.6rem; font-weight: 900; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box" data-aos="zoom-in">
            <img src="Picsart_24-12-16_17-48-42-061.png" 
                 alt="رئاسة الحرس الملكي" 
                 class="main-logo"
                 onerror="this.src='https://i.ibb.co/b29b4bf7-f82a-4513-8d7c-8c75d3102801/image.png'">
        </div>

        <div class="header-section" data-aos="fade-up">
            <h1>رئاسة الحرس الملكي</h1>
            <div class="line"></div>
        </div>

        <div class="links-wrapper">
            <a href="login.html" class="royal-btn" data-aos="fade-up" data-aos-delay="100">بوابة المنسوبين</a>
            
            <a href="regulations.html" class="secondary-btn" data-aos="fade-up" data-aos-delay="200">
                <i class="fa-solid fa-shield-halved ml-2" style="color: #c5a059;"></i> الأنظمة والتعليمات
            </a>
        </div>

        <div class="grid-nav">
            <a href="org.html" class="nav-item" data-aos="fade-right" data-aos-delay="300">
                <i class="fa-solid fa-layer-group"></i>
                <span>الهيكل التنظيمي</span>
            </a>
            <a href="contact.html" class="nav-item" data-aos="fade-left" data-aos-delay="400">
                <i class="fa-solid fa-headset"></i>
                <span>مركز التواصل</span>
            </a>
        </div>
    </div>

    <footer>
        ROYAL GUARD PRESIDENCY SYSTEM • 2026
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
