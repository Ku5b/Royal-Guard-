<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة رئاسة الحرس الملكي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-green: #006400;
            --gold-accent: #d4af37;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: #000;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* إضافة توهج خلفي خفيف */
        body::after {
            content: "";
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0, 100, 0, 0.15) 0%, transparent 70%);
            z-index: -1;
        }

        .container { width: 100%; max-width: 400px; padding: 40px 20px; z-index: 1; }

        /* منطقة الشعار - تأكد أن اسم ملفك هو المكتوب بالأسفل */
        .logo-container { text-align: center; margin-bottom: 25px; }
        .main-logo { width: 170px; height: auto; margin: 0 auto; filter: drop-shadow(0 0 15px rgba(255,255,255,0.05)); }

        .title-section { text-align: center; margin-bottom: 40px; }
        .title-section h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.5px; }
        .title-section p { font-size: 0.7rem; color: #666; letter-spacing: 3px; font-weight: 700; }

        /* تحسين شكل الزر الرئيسي */
        .official-link {
            background: #fff;
            color: #000;
            font-weight: 900;
            padding: 22px;
            border-radius: 20px;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .official-link:active { transform: scale(0.96); }

        /* تصميم الخانات بشكل عصري (Card Style) */
        .secondary-link {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 18px;
            border-radius: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-bottom: 15px;
            transition: 0.3s;
            font-weight: 700;
        }
        .secondary-link i { color: var(--primary-green); font-size: 1.1rem; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        /* تحسين شكل الخانات المزدوجة */
        .grid-box {
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px 15px;
            border-radius: 24px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .grid-box i { 
            background: rgba(0, 100, 0, 0.1);
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            color: #00a000;
            margin-bottom: 15px;
            font-size: 1.3rem;
            transition: 0.3s;
        }
        .grid-box span { font-size: 0.85rem; font-weight: 700; opacity: 0.9; }
        
        .grid-box:hover { border-color: rgba(0, 100, 0, 0.4); transform: translateY(-5px); }
        .grid-box:hover i { background: var(--primary-green); color: #fff; transform: rotate(-5deg); }

        .footer-text { margin-top: 40px; font-size: 10px; color: #333; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- منطقة الشعار: تأكد من وجود ملف بنفس هذا الاسم في مجلد الموقع -->
        <div class="logo-container" data-aos="zoom-in">
            <img src="Picsart_24-12-16_17-48-42-061.png" 
                 alt="رئاسة الحرس الملكي" 
                 class="main-logo"
                 onerror="this.style.display='none'; console.error('الملف غير موجود');">
        </div>

        <div class="title-section" data-aos="fade-up">
            <h1>رئاسة الحرس الملكي</h1>
            <p>ADMINISTRATIVE PORTAL</p>
        </div>

        <a href="portal.html" class="official-link" data-aos="fade-up" data-aos-delay="100">
            <i class="fa-solid fa-fingerprint ml-2"></i> دخول المنسوبين
        </a>
        
        <a href="regulations.html" class="secondary-link" data-aos="fade-up" data-aos-delay="200">
            <i class="fa-solid fa-scroll ml-2"></i> الأنظمة والتعليمات الإدارية
        </a>

        <div class="info-grid">
            <a href="org.html" class="grid-box" data-aos="zoom-in" data-aos-delay="300">
                <i class="fa-solid fa-network-wired"></i>
                <span>الهيكل التنظيمي</span>
            </a>
            <a href="staff.html" class="grid-box" data-aos="zoom-in" data-aos-delay="400">
                <i class="fa-solid fa-user-shield"></i>
                <span>شؤون الأفراد</span>
            </a>
        </div>

        <div class="footer-text text-center" data-aos="fade-in">
            R.G.H MANAGEMENT SYSTEM • 2026
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
