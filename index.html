<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رئاسة الحرس الملكي | البوابة الإدارية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #000; 
            color: white; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 50px;
        }

        .main-container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }

        .logo-container img { width: 130px; margin: 0 auto 20px; filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.2)); }

        .btn-primary {
            background: white;
            color: black;
            font-weight: 900;
            padding: 18px;
            border-radius: 18px;
            width: 100%;
            display: block;
            margin-bottom: 15px;
            font-size: 1.1rem;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn-primary:hover { background: #d4af37; transform: translateY(-3px); }

        .btn-secondary {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: white;
            font-weight: 700;
            padding: 16px;
            border-radius: 18px;
            width: 100%;
            display: block;
            margin-bottom: 15px;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn-secondary:hover { border-color: #333; background: #111; }

        .grid-buttons { display: grid; grid-template-cols: 1fr 1fr; gap: 15px; }
        .grid-btn {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 25px 15px;
            border-radius: 25px;
            text-align: center;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }
        .grid-btn:hover { border-color: #22c55e; transform: scale(1.02); }
        .grid-btn i { font-size: 1.8rem; color: #22c55e; margin-bottom: 10px; display: block; }
        .grid-btn span { font-weight: 700; font-size: 0.9rem; }

        .footer-text { margin-top: 60px; color: #222; font-size: 0.65rem; letter-spacing: 2px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-container">
            <img src="unnamed.png" alt="شعار الحرس الملكي">
            <h1 class="text-2xl font-black mb-1">رئاسة الحرس الملكي</h1>
            <p class="text-gray-600 text-[10px] tracking-widest uppercase mb-10">Administrative Portal</p>
        </div>

        <div class="menu-items">
            <a href="portal.html" class="btn-primary">
                بوابة المنسوبين الموحدة
            </a>

            <a href="regulations.html" class="btn-secondary">
                <i class="fa-solid fa-file-shield ml-2"></i> الأنظمة والتعليمات الإدارية
            </a>

            <div class="grid-buttons">
                <a href="structure.html" class="grid-btn">
                    <i class="fa-solid fa-sitemap"></i>
                    <span>الهيكل التنظيمي</span>
                </a>

                <a href="staff.html" class="grid-btn">
                    <i class="fa-solid fa-users-gear"></i>
                    <span>شؤون الأفراد</span>
                </a>
            </div>
        </div>

        <div class="footer-text">
            R.G.H MANAGEMENT SYSTEM • 2026
        </div>
    </div>

</body>
</html>
