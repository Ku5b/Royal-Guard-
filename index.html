<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة رئاسة الحرس الملكي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 400px; padding: 40px 20px; }

        .logo-container { text-align: center; margin-bottom: 25px; }
        .main-logo { width: 180px; height: auto; margin: 0 auto; }

        .title-section { text-align: center; margin-bottom: 40px; }
        .title-section h1 { font-size: 1.6rem; font-weight: 900; color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .title-section p { font-size: 0.7rem; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        /* تعديل الزر الرئيسي ليكون أكثر بروزاً */
        .official-link {
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            color: #000000;
            font-weight: 900;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            display: block;
            text-decoration: none;
            margin-bottom: 18px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .official-link:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255,255,255,0.1); }

        /* تعديل الخانة الفرعية */
        .secondary-link {
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            font-weight: 700;
            padding: 18px;
            border-radius: 18px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-bottom: 18px;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .secondary-link:hover { background: rgba(255, 255, 255, 0.07); border-color: #004d00; }

        /* تعديل شكل الشبكة (الخانات السفلية) */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        .grid-box {
            background: linear-gradient(180deg, #0f0f0f 0%, #050505 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px 15px;
            border-radius: 22px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        /* إضافة لمعة خفيفة عند التمرير */
        .grid-box::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: 0.5s;
        }
        .grid-box:hover::after { left: 100%; }
        .grid-box:hover { border-color: rgba(0, 77, 0, 0.5); transform: translateY(-5px); }
        
        .grid-box i { 
            color: #008000; /* أخضر ملكي أوضح */
            margin-bottom: 12px; 
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px rgba(0, 128, 0, 0.3));
        }
        .grid-box span { display: block; font-size: 0.85rem; font-weight: 800; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container" data-aos="zoom-in">
            <img src="Picsart_24-12-16_17-48-42-061.png" 
                 alt="شعار رئاسة الحرس الملكي" 
                 class="main-logo">
        </div>

        <div class="title-section" data-aos="fade-up">
            <h1>رئاسة الحرس الملكي</h1>
            <p>Royal Guard Presidency</p>
        </div>

        <a href="portal.html" class="official-link" data-aos="fade-up" data-aos-delay="100">
            <i class="fa-solid fa-unlock-keyhole ml-2"></i> بوابة المنسوبين الموحدة
        </a>
        
        <a href="regulations.html" class="secondary-link" data-aos="fade-up" data-aos-delay="200">
            <i class="fa-solid fa-file-shield ml-2 text-green-600"></i> الأنظمة واللوائح الإدارية
        </a>

        <div class="info-grid">
            <a href="org.html" class="grid-box" data-aos="zoom-in" data-aos-delay="300">
                <i class="fa-solid fa-sitemap"></i>
                <span>الهيكل التنظيمي</span>
            </a>
            <a href="staff.html" class="grid-box" data-aos="zoom-in" data-aos-delay="400">
                <i class="fa-solid fa-users-gear"></i>
                <span>شؤون الأفراد</span>
            </a>
        </div>

        <div class="text-center mt-12 opacity-10 text-[9px] font-black tracking-widest">
            R.G.H MANAGEMENT SYSTEM • 2026
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
