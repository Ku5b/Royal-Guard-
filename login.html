<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول الموحدة | الحرس الملكي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #000; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .login-box { 
            width: 100%; 
            max-width: 380px; 
            padding: 40px 25px; 
            background: #050505; 
            border: 1px solid #111; 
            border-radius: 30px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-auth { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            color: white; 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            margin-top: 15px; 
            outline: none; 
            transition: 0.3s; 
            text-align: center;
        }

        .input-auth:focus { border-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }

        .login-btn { 
            background: #fff; 
            color: black; 
            font-weight: 900; 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            margin-top: 25px; 
            cursor: pointer; 
            transition: 0.3s; 
            border: none;
        }

        .login-btn:hover { background: #d4af37; transform: translateY(-2px); }

        /* تنسيق زر إنشاء حساب */
        .signup-link {
            display: block;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
            text-decoration: none;
            transition: 0.3s;
        }
        .signup-link b { color: #d4af37; }
        .signup-link:hover { color: #fff; }

        .error-msg { 
            color: #ff4d4d; 
            font-size: 0.75rem; 
            margin-top: 15px; 
            display: none; 
            background: rgba(255, 77, 77, 0.1); 
            padding: 10px; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="unnamed.png" alt="الشعار" style="width: 80px; margin: 0 auto 20px;">
        <h2 class="text-xl font-black mb-1">تسجيل دخول المنسوبين</h2>
        <p class="text-gray-500 text-[10px] mb-8 tracking-widest uppercase">Royal Guard Authentication</p>

        <!-- حقول الإدخال -->
        <input type="text" id="username" class="input-auth" placeholder="اسم المستخدم (Discord)">
        <input type="password" id="password" class="input-auth" placeholder="كلمة المرور">
        
        <div id="error" class="error-msg">خطأ في البيانات. تأكد من الاسم وكلمة المرور.</div>
        
        <!-- زر الدخول -->
        <button onclick="validateLogin()" class="login-btn">دخول النظام</button>

        <!-- زر الربط مع صفحة إنشاء حساب -->
        <a href="signup-request.html" class="signup-link">
            ليس لديك حساب؟ <b>تقديم طلب وصول عسكري</b>
        </a>
    </div>

    <script>
        function validateLogin() {
            const userBox = document.getElementById('username').value;
            const passBox = document.getElementById('password').value;
            const errorMsg = document.getElementById('error');

            // قائمة الحسابات المصرح لها (أضف من تريد هنا)
            const users = [
                { user: "sultan", pass: "12345" },
                { user: "nawaf", pass: "5566" }
            ];

            const foundUser = users.find(u => u.user === userBox && u.pass === passBox);

            if (foundUser) {
                window.location.href = "portal.html"; 
            } else {
                errorMsg.style.display = 'block';
            }
        }
    </script>

</body>
</html>
