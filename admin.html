<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة القطاع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .admin-box { width: 100%; max-width: 400px; padding: 30px; background: #050505; border: 1px solid #111; border-radius: 20px; text-align: center; }
        .input-pass { background: #0a0a0a; border: 1px solid #1a1a1a; color: white; width: 100%; padding: 15px; border-radius: 12px; margin-top: 20px; outline: none; text-align: center; }
        .admin-btn { background: #d4af37; color: #000; font-weight: 900; width: 100%; padding: 15px; border-radius: 12px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginSection" class="admin-box">
        <h2 class="text-xl font-black">نظام إدارة القطاع</h2>
        <p class="text-xs text-gray-500 mt-2">خاص بالقادة فقط - الدخول بكلمة السر</p>
        <input type="password" id="adminPass" class="input-pass" placeholder="أدخل رمز الإدارة">
        <button onclick="checkAdmin()" class="admin-btn">دخول لوحة التحكم</button>
    </div>

    <!-- لوحة التحكم المخفية -->
    <div id="controlPanel" class="admin-box hidden">
        <h2 class="text-xl font-black text-green-600">لوحة التحكم</h2>
        <div class="mt-8 space-y-4 text-right">
            <a href="https://docs.google.com/spreadsheets" target="_blank" class="block p-4 bg-[#0a0a0a] rounded-lg border border-zinc-800 hover:border-green-600">
                 📝 تعديل قاعدة البيانات (جداول جوجل)
            </a>
            <a href="https://github.com" target="_blank" class="block p-4 bg-[#0a0a0a] rounded-lg border border-zinc-800 hover:border-green-600">
                 🛠️ تعديل ملفات الموقع (GitHub)
            </a>
            <a href="https://formspree.io" target="_blank" class="block p-4 bg-[#0a0a0a] rounded-lg border border-zinc-800 hover:border-green-600">
                 📧 مراجعة طلبات الترقيات
            </a>
        </div>
    </div>

    <script>
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "ADMIN123") { // غير كلمة السر هنا
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('controlPanel').classList.remove('hidden');
            } else {
                alert("رمز الإدارة خاطئ!");
            }
        }
    </script>
</body>
</html>
