<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الأعمال اليومية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: white; min-height: 100vh; }
        .form-container { width: 100%; max-width: 450px; padding: 30px 20px; margin: 0 auto; }
        
        .input-field {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: white;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            margin-top: 8px;
            outline: none;
            transition: 0.3s;
        }
        .input-field:focus { border-color: #006400; box-shadow: 0 0 10px rgba(0, 100, 0, 0.2); }
        
        label { font-size: 0.85rem; font-weight: 700; color: #aaa; margin-right: 5px; }

        .submit-btn {
            background: #fff;
            color: #000;
            font-weight: 900;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #006400; color: #fff; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 class="text-center font-black text-xl mb-8">رفع تقرير عمل يومي</h2>

        <!-- استبدل YOUR_EMAIL بإيميلك الشخصي -->
        <form action="https://formspree.io/f/YOUR_ID" method="POST">
            
            <div class="mb-4">
                <label>اسم المنسوب</label>
                <input type="text" name="الاسم" class="input-field" placeholder="أدخل الاسم الثلاثي" required>
            </div>

            <div class="mb-4">
                <label>الرقم العسكري / الهوية</label>
                <input type="text" name="المعرف" class="input-field" placeholder="أدخل الرقم" required>
            </div>

            <div class="mb-4">
                <label>نوع المهمة</label>
                <select name="نوع المهمة" class="input-field">
                    <option>حراسة ميدانية</option>
                    <option>مهمة إدارية</option>
                    <option>دورية أمنية</option>
                    <option>أخرى</option>
                </select>
            </div>

            <div class="mb-4">
                <label>تفاصيل العمل المنجز</label>
                <textarea name="التفاصيل" rows="4" class="input-field" placeholder="اكتب ملخص ما تم إنجازه..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">إرسال التقرير للمسؤول</button>
        </form>
    </div>

</body>
</html>
