<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الأعمال اليومية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: white; min-height: 100vh; }
        .form-container { width: 100%; max-width: 450px; padding: 30px 20px; margin: 0 auto; }
        .input-field { background: #0a0a0a; border: 1px solid #1a1a1a; color: white; width: 100%; padding: 15px; border-radius: 12px; margin-top: 8px; outline: none; }
        .upload-box { background: #111; border: 1px dashed #d4af37; padding: 15px; border-radius: 12px; text-align: center; margin-top: 10px; }
        .upload-link { color: #d4af37; font-weight: bold; text-decoration: underline; font-size: 0.9rem; }
        .submit-btn { background: #fff; color: #000; font-weight: 900; width: 100%; padding: 18px; border-radius: 15px; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 class="text-center font-black text-xl mb-6">رفع تقرير عمل يومي</h2>

        <!-- رابط لرفع الصور خارجياً -->
        <div class="upload-box mb-6">
            <p class="text-xs text-gray-400 mb-2">لإرفاق صور الدليل، ارفعها هنا أولاً:</p>
            <a href="https://top4top.io/" target="_blank" class="upload-link">
                <i class="fa-solid fa-cloud-arrow-up ml-1"></i> اضغط هنا لرفع الصور
            </a>
            <p class="text-[10px] text-gray-500 mt-2">(ارفع الصورة ثم انسخ "رابط الصورة" وضعه في الأسفل)</p>
        </div>

        <form action="https://formspree.io/f/xbdwzwkp" method="POST">
            <div class="mb-4">
                <label class="text-sm">اسم المنسوب</label>
                <input type="text" name="الاسم" class="input-field" required>
            </div>

            <div class="mb-4">
                <label class="text-sm">الرمز العسكري</label>
                <input type="text" name="الرمز" class="input-field" required>
            </div>

            <div class="mb-4">
                <label class="text-sm">نوع المهمة</label>
                <select name="المهمة" class="input-field">
                    <option>حراسة المحكمة</option>
                    <option>حراسة البنك المركزي</option>
                    <option>حراسة المستشفى</option>
                    <option>حراسة مركز الشرطة</option>
                    <option>حراسة إحدى قيادات وزارة الداخلية</option>
                    <option>حراسة شخصيات هامة</option>
                </select>
            </div>

            <!-- خانات روابط الصور -->
            <div class="mb-4">
                <label class="text-sm">رابط صورة الدليل (1)</label>
                <input type="url" name="رابط_الدليل_1" class="input-field" placeholder="إلصق الرابط هنا">
            </div>

            <div class="mb-4">
                <label class="text-sm">رابط صورة الدليل (2)</label>
                <input type="url" name="رابط_الدليل_2" class="input-field" placeholder="إلصق الرابط هنا">
            </div>

            <div class="mb-4">
                <label class="text-sm">تفاصيل العمل</label>
                <textarea name="التفاصيل" rows="3" class="input-field" required></textarea>
            </div>

            <button type="submit" class="submit-btn">إرسال التقرير</button>
        </form>
    </div>

</body>
</html>
