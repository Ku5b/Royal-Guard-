<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الأعمال اليومية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: white; min-height: 100vh; }
        .form-container { width: 100%; max-width: 450px; padding: 30px 20px; margin: 0 auto; }
        
        .input-field {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: white;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            margin-top: 8px;
            outline: none;
            transition: 0.3s;
        }
        .input-field:focus { border-color: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }
        
        label { font-size: 0.85rem; font-weight: 700; color: #aaa; margin-right: 5px; }
        .link-note { color: #d4af37; font-size: 0.7rem; display: block; margin-top: 5px; opacity: 0.8; }

        .submit-btn {
            background: #fff;
            color: #000;
            font-weight: 900;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }
        .submit-btn:hover { background: #22c55e; color: #fff; transform: translateY(-2px); }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: #555;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <a href="portal.html" class="back-link">
            <i class="fa-solid fa-arrow-right ml-2"></i> العودة للبوابة
        </a>

        <h2 class="text-center font-black text-xl mb-8">رفع تقرير عمل يومي</h2>

        <form action="https://formspree.io/f/xbdwzwkp" method="POST">
            
            <div class="mb-4">
                <label>اسم المنسوب</label>
                <input type="text" name="اسم المنسوب" class="input-field" placeholder="أدخل الاسم الثلاثي" required>
            </div>

            <div class="mb-4">
                <label>الرمز العسكري</label>
                <input type="text" name="الرمز العسكري" class="input-field" placeholder="أدخل الرمز العسكري" required>
            </div>

            <div class="mb-4">
                <label>نوع المهمة</label>
                <select name="نوع المهمة" class="input-field" required>
                    <option value="" disabled selected>اختر المهمة من القائمة...</option>
                    <option>حراسة المحكمة</option>
                    <option>حراسة البنك المركزي</option>
                    <option>حراسة المستشفى</option>
                    <option>حراسة مركز الشرطة</option>
                    <option>حراسة إحدى قيادات وزارة الداخلية</option>
                    <option>حراسة شخصيات هامة أو ذوي مناصب</option>
                </select>
            </div>

            <!-- تم تغييرها لاستقبال روابط نصية -->
            <div class="mb-4">
                <label>رابط دليل الصورة (1)</label>
                <input type="url" name="رابط الدليل الأول" class="input-field" placeholder="ضع رابط الصورة هنا">
                <span class="link-note">* الصق رابط الصورة (مثلاً من مواقع رفع الصور)</span>
            </div>

            <div class="mb-4">
                <label>رابط دليل الصورة (2)</label>
                <input type="url" name="رابط الدليل الثاني" class="input-field" placeholder="ضع رابط الصورة هنا">
            </div>

            <div class="mb-4">
                <label>تفاصيل العمل المنجز</label>
                <textarea name="تفاصيل العمل" rows="4" class="input-field" placeholder="اكتب ملخص الإنجاز..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">إرسال التقرير للمسؤول</button>
        </form>
    </div>

</body>
</html>
