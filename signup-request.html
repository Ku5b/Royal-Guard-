<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب وصول للنظام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .form-box { width: 100%; max-width: 400px; padding: 30px; background: #050505; border: 1px solid #111; border-radius: 25px; }
        .input-field { background: #0a0a0a; border: 1px solid #1a1a1a; color: white; width: 100%; padding: 12px; border-radius: 10px; margin-top: 10px; outline: none; font-size: 0.85rem; }
        .submit-btn { background: #fff; color: #000; font-weight: 900; width: 100%; padding: 12px; border-radius: 10px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="form-box">
        <h2 class="text-lg font-black text-center mb-6">طلب إنشاء حساب منسوب</h2>
        
        <!-- استخدم رابط Formspree الخاص بك هنا -->
        <form action="https://formspree.io/f/xbdwzwkp" method="POST">
            <label class="text-xs text-gray-500">الاسم في Discord</label>
            <input type="text" name="طلب_اسم_ديسكورد" class="input-field" required>

            <label class="text-xs text-gray-500 mt-4 block">الرمز العسكري</label>
            <input type="text" name="طلب_رمز_عسكري" class="input-field" required>

            <label class="text-xs text-gray-500 mt-4 block">الرتبة الحالية</label>
            <input type="text" name="الرتبة" class="input-field" required>

            <p class="text-[9px] text-yellow-600 mt-4">سيتم مراجعة طلبك من قبل إدارة شؤون الأفراد وإرسال كلمة المرور لك.</p>

            <button type="submit" class="submit-btn">إرسال الطلب للمراجعة</button>
        </form>
    </div>

</body>
</html>
